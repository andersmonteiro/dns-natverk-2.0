services:

  bind:
    build: ./bind
    restart: unless-stopped
    ports:
      - "${DNS_PORT_UDP:-53}:53/udp"
      - "${DNS_PORT_TCP:-53}:53/tcp"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - bind_etc:/etc/bind        # config (compartilhado com backend)
      - bind_cache:/var/cache/bind
      - bind_log:/var/log/named   # logs (compartilhado com backend)

  krill:
    build: ./krill
    restart: unless-stopped
    environment:
      - KRILL_AUTH_TOKEN=${KRILL_AUTH_TOKEN:-change-me-krill-token}
      - KRILL_ADMIN_TOKEN=${KRILL_AUTH_TOKEN:-change-me-krill-token}
      - KRILL_FQDN=${KRILL_FQDN:-localhost}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - krill_data:/var/krill/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - bind
      - krill
    cap_add:
      - NET_RAW     # ping, traceroute, mtr direto no container
      - NET_ADMIN   # traceroute/mtr precisam de raw sockets
    volumes:
      - dns_data:/data
      - bind_etc:/etc/bind        # lê/escreve config do BIND
      - bind_cache:/var/cache/bind # needed for named-checkconf
      - bind_log:/var/log/named:ro  # lê logs
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATABASE_URL=sqlite:////data/dns_panel.db
      - SECRET_KEY=${SECRET_KEY:-changeme-please-set-in-env}
      - BIND_LOG_PATH=${BIND_LOG_PATH:-/var/log/named/queries.log}
      - RNDC_PATH=${RNDC_PATH:-/usr/sbin/rndc}
      - RNDC_HOST=${RNDC_HOST:-bind}
      - RNDC_KEY_FILE=${RNDC_KEY_FILE:-/etc/bind/rndc.key}
      - COLLECTOR_ENABLED=${COLLECTOR_ENABLED:-true}
      - KRILL_URL=${KRILL_URL:-https://krill:3000}
      - KRILL_AUTH_TOKEN=${KRILL_AUTH_TOKEN:-change-me-krill-token}
      - SERVER_IPV4=${SERVER_IPV4:-}
      - SERVER_IPV6=${SERVER_IPV6:-}

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  dns_data:
  bind_etc:
  bind_cache:
  bind_log:
  krill_data:
