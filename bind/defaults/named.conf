// named.conf — DNS Nätverk Panel
// Gerado pelo instalador. Edite via painel ou diretamente.

include "/etc/bind/rndc.key";

controls {
    // Aceita rndc de qualquer IP da rede Docker — a chave provê a segurança
    inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };
};

include "/etc/bind/named.conf.options";
include "/etc/bind/named.conf.local";
include "/etc/bind/named.conf.blocks";
