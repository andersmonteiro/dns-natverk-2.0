# Overlay para produção em servidores Debian com BIND9 instalado no host.
# Uso: make prod  ou  make prod-build

services:
  backend:
    network_mode: host
    extra_hosts: []
    environment:
      - RNDC_HOST=127.0.0.1

  frontend:
    network_mode: host

  nginx:
    network_mode: host
    ports: []
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
