# Overlay de produção — não precisa mais de host network
# BIND expõe porta 53 via port mapping, nginx expõe 80/443
# Use: make prod  ou  make prod-build

services:
  bind:
    environment:
      - RNDC_HOST=bind

  backend:
    environment:
      - RNDC_HOST=bind

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
